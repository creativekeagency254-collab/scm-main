<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>EdisonPay UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const host = location.hostname;
      const isPrivateIp =
        /^(10\\.|192\\.168\\.|172\\.(1[6-9]|2\\d|3[0-1])\\.)/.test(host);
      const isLocalhost =
        host === "localhost" || host === "127.0.0.1" || host === "[::1]" || host === "0.0.0.0" || isPrivateIp;
      if (!isLocalhost && "serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {});
        });
      }
    </script>
    <script type="module">
      const chatFlagRaw = String(import.meta.env.VITE_ENABLE_TAWK_CHAT ?? "");
      const chatFlag = chatFlagRaw.trim().toLowerCase();
      const chatEnabled = chatFlag === "1" || chatFlag === "true";
      let chatConsent = null;
      try { chatConsent = localStorage.getItem("ep:chat-consent"); } catch (e) {}
      const canLoadChat = chatEnabled && (chatConsent === "1" || chatConsent === "true");

      if (canLoadChat) {
        var Tawk_API = window.Tawk_API || {}, Tawk_LoadStart = new Date();
        Tawk_API.onLoad = function() {
          try { Tawk_API.hideWidget(); } catch (e) {}
        };
        Tawk_API.onChatMinimized = function() {
          try { Tawk_API.hideWidget(); } catch (e) {}
        };
        (function() {
          var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
          s1.async = true;
          s1.src = "https://embed.tawk.to/69b323009090b01c368b958f/1jjhs1fev";
          s1.charset = "UTF-8";
          s1.setAttribute("crossorigin", "*");
          s0.parentNode.insertBefore(s1, s0);
        })();
      }
    </script>
  </body>
</html>
