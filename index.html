<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>EdisonPay UI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function recoverFromStaleServiceWorker() {
        const RESET_PARAM = "__sw_reset_done";
        if (!("serviceWorker" in navigator)) return;
        const currentUrl = new URL(window.location.href);
        const alreadyReset = currentUrl.searchParams.get(RESET_PARAM) === "1";
        window.addEventListener("load", () => {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            if (!Array.isArray(registrations) || registrations.length === 0) {
              if (alreadyReset) {
                currentUrl.searchParams.delete(RESET_PARAM);
                const cleanPath = `${currentUrl.pathname}${currentUrl.search}${currentUrl.hash || ""}`;
                window.history.replaceState({}, document.title, cleanPath);
              }
              return;
            }
            return Promise.all(registrations.map((reg) => reg.unregister())).then(() => {
              if ("caches" in window && caches?.keys) {
                return caches.keys().then((keys) => Promise.all(keys.map((k) => caches.delete(k))));
              }
              return null;
            }).then(() => {
              if (alreadyReset) return;
              currentUrl.searchParams.set(RESET_PARAM, "1");
              window.location.replace(currentUrl.toString());
            });
          }).catch(() => {});
        });
      })();
    </script>
    <script type="module" src="/src/tawk-chat-loader.js"></script>
  </body>
</html>
